<mat-toolbar class="header-toolbar">
    <div class="header-left">
        <button mat-icon-button (click)="toggleSidenav()" class="menu-button">
            <mat-icon>menu</mat-icon>
        </button>
        <span class="app-title">MediTrack</span>
    </div>
    <div class="header-right">
        <span class="current-time">{{ currentTime }}</span>
        <img src="/assets/meditrack-logo.png" alt="MediTrack Logo" class="app-logo">
    </div>
</mat-toolbar>

<mat-sidenav-container class="sidenav-container">
    <mat-sidenav #drawer
                 mode="side"
                 [opened]="isSidenavOpen"
                 class="sidenav">
        <mat-nav-list class="nav-list">
            @for (item of navigationItems; track item.link) {
                <a mat-list-item
                   [routerLink]="item.link"
                   routerLinkActive="active"
                   (click)="closeSidenav()"
                   class="nav-item">
                    <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
                    <span matListItemTitle>{{ item.label | translate }}</span>
                </a>
            }
            
            <a mat-list-item 
               (click)="logout()"
               class="nav-item logout-button">
                <mat-icon matListItemIcon>logout</mat-icon>
                <span matListItemTitle>{{ 'navigation.logout' | translate }}</span>
            </a>
        </mat-nav-list>
        
        <div class="language-switcher-container">
            <app-language-switcher></app-language-switcher>
        </div>
    </mat-sidenav>

    <mat-sidenav-content>
        <router-outlet></router-outlet>
    </mat-sidenav-content>
</mat-sidenav-container>
