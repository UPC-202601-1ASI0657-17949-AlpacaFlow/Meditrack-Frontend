<h2 mat-dialog-title>{{ 'caregiver.deleteCaregiverDialog.title' | translate }}</h2>
<mat-dialog-content>
  <p>{{ 'caregiver.deleteCaregiverDialog.message' | translate }}</p>
  <p><strong>{{ data.caregiver.fullName }}</strong></p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">
    {{ 'caregiver.deleteCaregiverDialog.cancel' | translate }}
  </button>
  <button mat-raised-button color="warn" (click)="onConfirm()">
    {{ 'caregiver.deleteCaregiverDialog.confirm' | translate }}
  </button>
</mat-dialog-actions>
